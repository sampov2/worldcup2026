<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap');
:root {
  --bg:#0A0E1A; --card:#1C2235; --border:#2A3050;
  --text:#E8EAF2; --sub:#7A82A8; --muted:#4A5280;
  --gold:#C9A84C; --win:#2ECC71;
  --ctrl:#1C2235; --cborder:#3A4060;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;font-weight:600;}
.page{max-width:1400px;margin:0 auto;padding:20px 16px 40px;}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--gold);padding-bottom:12px;margin-bottom:18px;gap:12px;}
.hdr h1{font-size:clamp(18px,4vw,30px);font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);line-height:1;}
.hdr .sub{font-size:clamp(9px,1.5vw,12px);letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-top:3px;}
.nav{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.nbtn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:4px;border:1.5px solid var(--cborder);background:var(--ctrl);color:var(--text);text-decoration:none;display:inline-block;transition:opacity .2s;}
.nbtn:hover{opacity:.8;}
.nbtn.on{background:var(--gold);color:#0A0E1A;border-color:var(--gold);}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.ctrl{display:flex;align-items:center;gap:8px;}
.clbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);white-space:nowrap;}
select{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;border:1.5px solid var(--cborder);border-radius:4px;padding:4px 8px;background:var(--ctrl);color:var(--text);cursor:pointer;}

/* MOBILE TABS */
.tabs{display:none;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:1.5px solid var(--cborder);background:var(--ctrl);color:var(--sub);cursor:pointer;transition:all .2s;}
.tab.on{background:var(--gold);color:#0A0E1A;border-color:var(--gold);}

/* DESKTOP BRACKET */
.bwrap{overflow-x:auto;padding-bottom:12px;}
.bracket{display:flex;align-items:stretch;min-width:860px;}
.bcol{display:flex;flex-direction:column;flex:1;min-width:0;padding:0 3px;}
.bcol.fcol{flex:1;min-width:0;display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:0 4px;gap:6px;}
.blbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:center;padding:6px 2px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.bmatches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:3px;padding:2px 0;}

/* MATCH BOX */
.mb{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin:2px 0;width:100%;}
.mb.fin{border-color:var(--win);}
.mbnum{font-size:11px;font-weight:700;color:var(--gold);padding:4px 7px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.mbnum .mbt{color:#8A93B8;font-weight:600;}
.mbt2{display:flex;align-items:center;gap:5px;padding:7px 7px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;min-height:32px;line-height:1.2;}
.mbt2:last-of-type{border-bottom:none;}
.mbt2.w{color:var(--win);background:rgba(46,204,113,.1);}
.mbt2.ph{color:#8A93B8;font-style:normal;font-size:13px;font-weight:700;}
.mbt2 .sc{margin-left:auto;font-weight:800;flex-shrink:0;}
.mbt2 img{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0;vertical-align:middle;}

/* FINAL */
.ftrophy{font-size:32px;text-align:center;}
.flbl{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-align:center;}
.champ{font-size:13px;font-weight:800;color:var(--win);text-align:center;min-height:18px;margin-top:3px;}
.tplbl{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);text-align:center;margin-top:12px;}

/* MOBILE */
.bmob{display:none;}
.mround{display:none;flex-direction:column;gap:8px;}
.mround.on{display:flex;}
.mm{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;} .mm.inpair{border-radius:0;border:none;border-bottom:1px solid var(--border);}
.mm.fin{border-color:var(--win);}
.mmh{display:flex;justify-content:space-between;padding:4px 10px;border-bottom:1px solid var(--border);font-size:11px;color:#8A93B8;font-weight:600;}
.mmh .mnum{color:var(--gold);font-weight:800;font-size:12px;}
.mmt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;}
.mmt:last-of-type{border-bottom:none;}
.mmt.w{color:var(--win);background:rgba(46,204,113,.08);}
.mmt.ph{color:#8A93B8;font-style:normal;font-weight:700;font-size:13px;}
.mmt .sc{margin-left:auto;font-weight:800;}
.mmt img{width:18px;height:13px;object-fit:cover;border-radius:2px;vertical-align:middle;}

/* FOOTER */
.foot{margin-top:20px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.foot p{font-size:11px;color:var(--muted);}

@media(max-width:900px){
  .bwrap{display:none;} .bmob{display:block;} .tabs{display:flex;}
  .hdr{flex-wrap:wrap;} .hdr-r{align-items:flex-start;width:100%;}
  .page{padding:14px 12px 32px;}
}
</style>
</head>

<script>
const NAME_MAP = {
  'Korea Republic':'South Korea','United States':'USA',
  'Bosnia-H.':'Bosnia','Bosnia-Herzegovina':'Bosnia',
  'Curaçao':'Curacao','Turkey':'Turkiye','Cape Verde Islands':'Cape Verde'
};
const FLAGS = {
  'Algeria':'dz','Argentina':'ar','Australia':'au','Austria':'at','Belgium':'be',
  'Bosnia':'ba','Brazil':'br','Canada':'ca','Cape Verde':'cv','Colombia':'co',
  'Congo DR':'cd','Croatia':'hr','Curacao':'cw','Czechia':'cz','Ecuador':'ec',
  'Egypt':'eg','England':'gb-eng','France':'fr','Germany':'de','Ghana':'gh',
  'Haiti':'ht','Iran':'ir','Iraq':'iq','Ivory Coast':'ci','Japan':'jp',
  'Jordan':'jo','Mexico':'mx','Morocco':'ma','Netherlands':'nl','New Zealand':'nz',
  'Norway':'no','Panama':'pa','Paraguay':'py','Portugal':'pt','Qatar':'qa',
  'Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn','South Africa':'za',
  'South Korea':'kr','Spain':'es','Sweden':'se','Switzerland':'ch','Tunisia':'tn',
  'Turkiye':'tr','Uruguay':'uy','USA':'us','Uzbekistan':'uz'
};
const FEEDERS = {537376:['M74','M77'],537375:['M73','M75'],537377:['M76','M78'],537378:['M79','M80'],537379:['M83','M84'],537380:['M81','M82'],537381:['M86','M88'],537382:['M85','M87'],537383:['M89','M90'],537384:['M93','M94'],537385:['M91','M92'],537386:['M95','M96'],537387:['M97','M98'],537388:['M99','M100'],537390:['M101','M102'],537389:['M101','M102']};

const PH = {
  537417:['2nd A','2nd B'],      537423:['Win C','2nd F'],
  537415:['Win E','3rd A/B/C/D/F'], 537418:['Win F','2nd C'],
  537424:['2nd E','2nd I'],      537416:['Win I','3rd C/D/F/G/H'],
  537425:['Win A','3rd C/E/F/H/I'], 537426:['Win L','3rd E/H/I/J/K'],
  537422:['Win G','3rd A/E/H/I/J'], 537421:['Win D','3rd B/E/F/I/J'],
  537420:['Win H','2nd J'],      537419:['2nd K','2nd L'],
  537429:['Win B','3rd D/E/I/J/L'], 537428:['2nd D','2nd G'],
  537427:['Win J','2nd H'],      537430:['Win K','3rd D/E/I/J/L']
};

// Hardcoded matches - always renders even without data.json
const BASE = [
  {id:537417,stage:'LAST_32',utcDate:'2026-06-28T19:00:00Z'},{id:537423,stage:'LAST_32',utcDate:'2026-06-29T17:00:00Z'},
  {id:537415,stage:'LAST_32',utcDate:'2026-06-29T20:30:00Z'},{id:537418,stage:'LAST_32',utcDate:'2026-06-30T01:00:00Z'},
  {id:537424,stage:'LAST_32',utcDate:'2026-06-30T17:00:00Z'},{id:537416,stage:'LAST_32',utcDate:'2026-06-30T21:00:00Z'},
  {id:537425,stage:'LAST_32',utcDate:'2026-07-01T01:00:00Z'},{id:537426,stage:'LAST_32',utcDate:'2026-07-01T16:00:00Z'},
  {id:537422,stage:'LAST_32',utcDate:'2026-07-01T20:00:00Z'},{id:537421,stage:'LAST_32',utcDate:'2026-07-02T00:00:00Z'},
  {id:537420,stage:'LAST_32',utcDate:'2026-07-02T19:00:00Z'},{id:537419,stage:'LAST_32',utcDate:'2026-07-02T23:00:00Z'},
  {id:537429,stage:'LAST_32',utcDate:'2026-07-03T03:00:00Z'},{id:537428,stage:'LAST_32',utcDate:'2026-07-03T18:00:00Z'},
  {id:537427,stage:'LAST_32',utcDate:'2026-07-03T22:00:00Z'},{id:537430,stage:'LAST_32',utcDate:'2026-07-04T01:30:00Z'},
  {id:537376,stage:'LAST_16',utcDate:'2026-07-04T17:00:00Z'},{id:537375,stage:'LAST_16',utcDate:'2026-07-04T21:00:00Z'},
  {id:537377,stage:'LAST_16',utcDate:'2026-07-05T20:00:00Z'},{id:537378,stage:'LAST_16',utcDate:'2026-07-06T00:00:00Z'},
  {id:537379,stage:'LAST_16',utcDate:'2026-07-06T19:00:00Z'},{id:537380,stage:'LAST_16',utcDate:'2026-07-07T00:00:00Z'},
  {id:537381,stage:'LAST_16',utcDate:'2026-07-07T16:00:00Z'},{id:537382,stage:'LAST_16',utcDate:'2026-07-07T20:00:00Z'},
  {id:537383,stage:'QUARTER_FINALS',utcDate:'2026-07-09T20:00:00Z'},{id:537384,stage:'QUARTER_FINALS',utcDate:'2026-07-10T19:00:00Z'},
  {id:537385,stage:'QUARTER_FINALS',utcDate:'2026-07-11T21:00:00Z'},{id:537386,stage:'QUARTER_FINALS',utcDate:'2026-07-12T01:00:00Z'},
  {id:537387,stage:'SEMI_FINALS',utcDate:'2026-07-14T19:00:00Z'},{id:537388,stage:'SEMI_FINALS',utcDate:'2026-07-15T19:00:00Z'},
  {id:537389,stage:'THIRD_PLACE',utcDate:'2026-07-18T21:00:00Z'},
  {id:537390,stage:'FINAL',utcDate:'2026-07-19T19:00:00Z'}
].map(m => ({...m, status:'TIMED', homeTeam:{name:null,shortName:null}, awayTeam:{name:null,shortName:null}, score:{fullTime:{home:null,away:null}}}));

let matches = BASE.map(m => ({...m}));
const mnums = {};

function norm(n){ return n ? (NAME_MAP[n]||n) : null; }
function flag(t){
  if(!t) return '';
  const c=FLAGS[t]||FLAGS[norm(t)];
  if(!c) return '';
  return `<img src="https://flagcdn.com/w20/${c}.png" alt="" style="width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0;vertical-align:middle">`;
}
function pad(n){ return String(Math.floor(Math.abs(n))).padStart(2,'0'); }
function fmt(utc, off){
  const d = new Date(new Date(utc).getTime() + off*3600000);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h=d.getUTCHours(), mi=d.getUTCMinutes();
  const p=h>=12?'pm':'am', h12=h%12||12;
  return `${d.getUTCDate()} ${mo[d.getUTCMonth()]} ${h12}:${pad(mi)}${p}`;
}
function getOff(){ return parseFloat(document.getElementById('tzsel').value); }

function teams(m){
  const h=m.homeTeam?.shortName||m.homeTeam?.name;
  const a=m.awayTeam?.shortName||m.awayTeam?.name;
  const hn=h?norm(h):null, an=a?norm(a):null;
  // For R16 onwards use "Win M73" style placeholders
  const feeders=FEEDERS[m.id];
  let phh, pha;
  if(feeders){
    phh='Win '+feeders[0];
    pha='Win '+feeders[1];
    // 3rd place uses losers
    if(m.stage==='THIRD_PLACE'){phh='Loss M101';pha='Loss M102';}
  } else {
    const ph=PH[m.id]||['TBD','TBD'];
    phh=ph[0]; pha=ph[1];
  }
  return { h:hn||phh, a:an||pha, hph:!hn, aph:!an };
}

function getExtra(m){
  if(m.status!=='FINISHED') return '';
  const d=m.score?.duration;
  if(d==='PENALTY_SHOOTOUT') return ' <span style="font-size:8px;color:#8A93B8">(pens)</span>';
  if(d==='EXTRA_TIME') return ' <span style="font-size:8px;color:#8A93B8">(aet)</span>';
  return '';
}

function mbox(m, off){
  const {h,a,hph,aph}=teams(m);
  const fin=m.status==='FINISHED';
  const hg=m.score?.fullTime?.home, ag=m.score?.fullTime?.away;
  const winner=m.score?.winner;
  const hw=fin&&(winner==='HOME_TEAM'||(winner==null&&hg!=null&&hg>ag));
  const aw=fin&&(winner==='AWAY_TEAM'||(winner==null&&ag!=null&&ag>hg));
  const num=mnums[m.id]||'';
  const dt=fmt(m.utcDate,off);
  const tr=(n,ph,w,sc)=>`<div class="mbt2${w?' w':''}${ph?' ph':''}">
    ${!ph?flag(n):''}
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n}</span>
    ${sc!=null?`<span class="sc">${sc}</span>`:''}
  </div>`;
  return `<div class="mb${fin?' fin':''}">
    <div class="mbnum"><span>${num}</span><span class="mbt">${dt}</span></div>
    ${tr(h,hph,hw,fin?hg:null)}
    ${tr(a,aph,aw,fin?ag:null)}
  </div>`;
}

function mobMatch(m, off){
  const {h,a,hph,aph}=teams(m);
  const fin=m.status==='FINISHED';
  const hg=m.score?.fullTime?.home, ag=m.score?.fullTime?.away;
  const winner=m.score?.winner;
  const hw=fin&&(winner==='HOME_TEAM'||(winner==null&&hg!=null&&hg>ag));
  const aw=fin&&(winner==='AWAY_TEAM'||(winner==null&&ag!=null&&ag>hg));
  const num=mnums[m.id]||'';
  const dt=fmt(m.utcDate,off);
  const tr=(n,ph,w,sc)=>`<div class="mmt${w?' w':''}${ph?' ph':''}">
    ${!ph?flag(n):''}
    <span style="flex:1">${n}</span>
    ${sc!=null?`<span class="sc">${sc}</span>`:''}
  </div>`;
  return `<div class="mm${fin?' fin':''}">
    <div class="mmh"><span class="mnum">${num}</span><span>${dt}</span></div>
    ${tr(h,hph,hw,fin?hg:null)}
    ${tr(a,aph,aw,fin?ag:null)}
  </div>`;
}

function byStage(s){ return matches.filter(m=>m.stage===s).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate)); }

function buildNums(){
  let n=73;
  ['LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','THIRD_PLACE','FINAL'].forEach(s=>{
    byStage(s).forEach(m=>{ mnums[m.id]='M'+n++; });
  });
}

function render(){
  const off=getOff();
  const sf=byStage('SEMI_FINALS');
  const fin=byStage('FINAL'), tp=byStage('THIRD_PLACE');

  // Build ordered arrays by explicit match ID order so bracket flows correctly
  // Match ID -> Match Number mapping (sorted by utcDate):
  // M73=537417 M74=537423 M75=537415 M76=537418 M77=537424 M78=537416
  // M79=537425 M80=537426 M81=537422 M82=537421 M83=537420 M84=537419
  // M85=537429 M86=537428 M87=537427 M88=537430
  // M89=537376 M90=537375 M91=537377 M92=537378
  // M93=537379 M94=537380 M95=537381 M96=537382
  // M97=537383 M98=537384 M99=537385 M100=537386

  function mById(id){ return matches.find(m=>m.id===id); }

  // R32 left side pairs (top feeds M89, then M90, M91, M92)
  const r32L=[
    mById(537417),mById(537415), // M73+M75 -> M90
    mById(537423),mById(537424), // M74+M77 -> M89
    mById(537418),mById(537416), // M76+M78 -> M91
    mById(537425),mById(537426), // M79+M80 -> M92
  ].filter(Boolean);

  const r32R=[
    mById(537422),mById(537421), // M81+M82 -> M94
    mById(537420),mById(537419), // M83+M84 -> M93
    mById(537428),mById(537430), // M86+M88 -> M95
    mById(537429),mById(537427), // M85+M87 -> M96
  ].filter(Boolean);

  // R16 left side pairs (M89+M90 -> M97, M91+M92 -> M98)
  const r16L=[
    mById(537375),mById(537376), // M90+M89 -> M97
    mById(537380),mById(537379), // M94+M93 -> M98
  ].filter(Boolean);

  const r16R=[
    mById(537377),mById(537378), // M91+M92 -> M99
    mById(537381),mById(537382), // M95+M96 -> M100
  ].filter(Boolean);

  // QF left (M97+M98 -> M101), QF right (M99+M100 -> M102)
  const qfL=[mById(537383),mById(537384)].filter(Boolean); // M97,M98
  const qfR=[mById(537385),mById(537386)].filter(Boolean); // M99,M100

  // Desktop - split left/right
  const col=(ms,lbl)=>`<div class="bcol">
    <div class="blbl">${lbl}</div>
    <div class="bmatches">${ms.map(m=>mbox(m,off)).join('')}</div>
  </div>`;

  const finM=fin[0], tpM=tp[0];
  const finT=finM?teams(finM):null;
  const champ=finM?.status==='FINISHED'
    ? (finM.score?.winner==='HOME_TEAM' ? finT.h : finM.score?.winner==='AWAY_TEAM' ? finT.a :
       finM.score.fullTime.home>finM.score.fullTime.away ? finT.h : finT.a) : '';

  const fcol=`<div class="bcol fcol">
    <div class="blbl">Final</div>
    <div class="ftrophy">🏆</div>
    ${finM?mbox(finM,off):'<div class="mb"><div class="mbt2 ph"><span>TBD</span></div><div class="mbt2 ph"><span>TBD</span></div></div>'}
    ${champ?`<div class="champ">🥇 ${champ}</div>`:''}
    ${tpM?`<div class="tplbl">3rd Place</div>${mbox(tpM,off)}`:''}
  </div>`;

  document.getElementById('bdesk').innerHTML =
    col(r32L,'Round of 32') +
    col(r16L,'Round of 16') +
    col(qfL,'Quarter-finals') +
    col(sf.slice(0,1),'Semi-finals') +
    fcol +
    col(sf.slice(1),'Semi-finals') +
    col(qfR,'Quarter-finals') +
    col(r16R,'Round of 16') +
    col(r32R,'Round of 32');

  // Mobile
  // R32 - render as pairs that feed same R16 match
  const r32pairs = [
    { r16:'M90', matches:[537417,537415] }, // M73+M75 -> M90
    { r16:'M89', matches:[537423,537424] }, // M74+M77 -> M89
    { r16:'M91', matches:[537418,537416] }, // M76+M78 -> M91
    { r16:'M92', matches:[537425,537426] }, // M79+M80 -> M92
    { r16:'M93', matches:[537420,537419] }, // M83+M84 -> M93
    { r16:'M94', matches:[537422,537421] }, // M81+M82 -> M94
    { r16:'M95', matches:[537428,537430] }, // M86+M88 -> M95
    { r16:'M96', matches:[537429,537427] }, // M85+M87 -> M96
  ];
  const r32El = document.getElementById('mr32');
  if(r32El){
    r32El.innerHTML = r32pairs.map(pair => {
      const [m1, m2] = pair.matches.map(id => mById(id)).filter(Boolean);
      if(!m1 && !m2) return '';
      return `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 10px;border-bottom:1px solid var(--border);text-align:right;">
          winners meet in <span style="color:var(--gold)">${pair.r16}</span>
        </div>
        ${m1 ? mobMatch(m1, off) : ''}
        <div style="display:flex;align-items:center;padding:0 0 0 12px;border-top:1px solid var(--border);background:rgba(42,48,80,0.4);">
          <div style="width:2px;height:28px;background:var(--gold);border-radius:1px;flex-shrink:0;margin-right:8px;"></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;">Winners play each other in <span style="color:#E8EAF2">${pair.r16}</span></span>
        </div>
        ${m2 ? mobMatch(m2, off) : ''}
      </div>`;
    }).join('');
  }

  // R16 pairs - each pair feeds a QF match
  const r16pairs = [
    { next:'M97',  matches:[537375,537376] }, // M89+M90
    { next:'M98',  matches:[537380,537379] }, // M91+M92
    { next:'M99',  matches:[537377,537378] }, // M93+M94
    { next:'M100', matches:[537381,537382] }, // M95+M96
  ];
  const r16El = document.getElementById('mr16');
  if(r16El){
    r16El.innerHTML = r16pairs.map(pair => {
      const [m1, m2] = pair.matches.map(id => mById(id)).filter(Boolean);
      if(!m1 && !m2) return '';
      return `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 10px;border-bottom:1px solid var(--border);text-align:right;">
          Winners meet in <span style="color:var(--gold)">${pair.next}</span>
        </div>
        ${m1 ? mobMatch(m1, off) : ''}
        <div style="display:flex;align-items:center;padding:0 0 0 12px;border-top:1px solid var(--border);background:rgba(42,48,80,0.4);">
          <div style="width:2px;height:28px;background:var(--gold);border-radius:1px;flex-shrink:0;margin-right:8px;"></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;">Winners play each other in <span style="color:#E8EAF2">${pair.next}</span></span>
        </div>
        ${m2 ? mobMatch(m2, off) : ''}
      </div>`;
    }).join('');
  }

  // QF pairs - each pair feeds a SF match
  const qfpairs = [
    { next:'M101', matches:[537383,537384] }, // M97+M98
    { next:'M102', matches:[537385,537386] }, // M99+M100
  ];
  const qfEl = document.getElementById('mrqf');
  if(qfEl){
    qfEl.innerHTML = qfpairs.map(pair => {
      const [m1, m2] = pair.matches.map(id => mById(id)).filter(Boolean);
      if(!m1 && !m2) return '';
      return `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 10px;border-bottom:1px solid var(--border);text-align:right;">
          Winners meet in <span style="color:var(--gold)">${pair.next}</span>
        </div>
        ${m1 ? mobMatch(m1, off) : ''}
        <div style="display:flex;align-items:center;padding:0 0 0 12px;border-top:1px solid var(--border);background:rgba(42,48,80,0.4);">
          <div style="width:2px;height:28px;background:var(--gold);border-radius:1px;flex-shrink:0;margin-right:8px;"></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;">Winners play each other in <span style="color:#E8EAF2">${pair.next}</span></span>
        </div>
        ${m2 ? mobMatch(m2, off) : ''}
      </div>`;
    }).join('');
  }

  // SF pair - winners meet in the Final
  const sfEl = document.getElementById('mrsf');
  if(sfEl){
    const m1 = mById(537387), m2 = mById(537388);
    sfEl.innerHTML = `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:4px 10px;border-bottom:1px solid var(--border);text-align:right;">
        Winners meet in <span style="color:var(--gold)">M104 The Final</span>
      </div>
      ${m1 ? mobMatch(m1, off) : ''}
      <div style="display:flex;align-items:center;padding:0 0 0 12px;border-top:1px solid var(--border);background:rgba(42,48,80,0.4);">
        <div style="width:2px;height:28px;background:var(--gold);border-radius:1px;flex-shrink:0;margin-right:8px;"></div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;">Winners play each other in <span style="color:#E8EAF2">M104 The Final</span></span>
      </div>
      ${m2 ? mobMatch(m2, off) : ''}
    </div>`;
  }

  // Handle final tab separately with labels
  const finEl=document.getElementById('mrfin');
  if(finEl){
    const finMatches=byStage('FINAL'), tpMatches=byStage('THIRD_PLACE');
    let html='';
    if(finMatches.length){
      html+=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:4px;">🏆 Final</div>`;
      html+=finMatches.map(m=>mobMatch(m,off)).join('');
    }
    if(tpMatches.length){
      html+=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--sub);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:4px;margin-top:12px;">3rd Place Play-off</div>`;
      html+=tpMatches.map(m=>mobMatch(m,off)).join('');
    }
    finEl.innerHTML=html;
  }


  // Footer
  const s=off>=0?'+':'', frac=off%1!==0;
  document.getElementById('ftz').textContent=`All times UTC${s}${frac?Math.floor(off)+':30':off}`;
}

// Mobile tabs
document.querySelectorAll('.tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.mround').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const rid = b.dataset.r;
    const el = document.getElementById('mr'+rid) || document.getElementById('mr'+rid.replace('r',''));
    if(el) el.classList.add('on');
  });
});

// Timezone
try{
  const sv=localStorage.getItem('wc2026_tz');
  if(sv){const s=document.getElementById('tzsel');const o=Array.from(s.options).find(x=>x.value===sv);if(o)s.value=sv;}
}catch(e){}
document.getElementById('tzsel').addEventListener('change',()=>{
  try{localStorage.setItem('wc2026_tz',getOff());}catch(e){}
  render();
});

// Load data.json and merge over base
async function load(){
  buildNums();
  render(); // render immediately with base data
  try{
    const r=await fetch('data.json?t='+Date.now());
    const d=await r.json();
    const ko=d.matches.filter(m=>m.stage!=='GROUP_STAGE');
    if(ko.length>0){
      // Merge: API data wins, but keep base for any missing
      const byId={};
      BASE.forEach(m=>byId[m.id]={...m});
      ko.forEach(m=>{ if(byId[m.id]) byId[m.id]={...byId[m.id],...m,homeTeam:m.homeTeam,awayTeam:m.awayTeam,score:m.score,status:m.status}; });
      matches=BASE.map(m=>byId[m.id]||m);
      render();
    }
  }catch(e){ console.log('data.json:',e.message); }
}

load();
setInterval(load,60000);
</script>
