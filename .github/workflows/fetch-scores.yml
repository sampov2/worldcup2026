name: Fetch World Cup Scores
 
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
permissions:
  contents: write
 
jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Fetch scores from API via Cloudflare Worker
        run: |
          curl -s "https://fancy-block-fde3.aking116.workers.dev/competitions/WC/matches?season=2026" \
            -o data.json \
            --fail \
            --max-time 10
          echo "Fetched $(cat data.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['matches']))" ) matches"
 
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
